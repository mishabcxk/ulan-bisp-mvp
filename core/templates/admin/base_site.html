{% extends "admin/base_site.html" %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="font-weight: bold; font-size: 26px; letter-spacing: -0.5px; color: var(--primary);">
        Ulan Moderator
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
<style>
    /* ==========================================
       LIGHT MODE (DEFAULT) VARIABLES
       ========================================== */
    :root {
        --primary: #F43F5E;         /* Rose accent */
        --secondary: #4B5563;       /* Slate Gray for table headers */
        --accent: #F43F5E;
        
        /* Header styling */
        --header-bg: #ffffff;       /* White header */
        --header-color: #374151;    /* Dark gray text */
        --header-link-color: #6B7280; /* Medium gray links */
        
        /* Breadcrumbs styling */
        --breadcrumbs-bg: #F9FAFB;
        --breadcrumbs-fg: #6B7280;
        --breadcrumbs-link-fg: #F43F5E;
    }

    /* ==========================================
       DARK MODE VARIABLES
       ========================================== */
    [data-theme="dark"] {
        --primary: #F43F5E;
        --secondary: #374151;
        --accent: #F43F5E;
        
        /* Dark Header styling */
        --header-bg: #111827;       /* Very dark header */
        --header-color: #F3F4F6;    /* Light text */
        --header-link-color: #9CA3AF;
        
        /* Dark Breadcrumbs */
        --breadcrumbs-bg: #1F2937;
        --breadcrumbs-fg: #9CA3AF;
        --breadcrumbs-link-fg: #F43F5E;
    }

    /* ==========================================
       STRUCTURAL TWEAKS
       ========================================== */
    /* Add a subtle shadow to separate the header from the body */
    #header {
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* Make sure the light/dark toggle icon matches the link color so it's visible */
    button#theme-toggle {
        color: var(--header-link-color);
    }
    button#theme-toggle:hover {
        color: var(--primary);
    }
</style>
{% endblock %}
